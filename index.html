    <script src="./app.js" defer></script>

<body>
    <header>
        <h1>titulo</h1>
    </header>
    <div>
        <aside id="pai-buttons">
            <a class="btn" href="#cotacao-moedas" id="cotacao">Cotação</a>
            <a class="btn" href="#calculo-imc" id="Imc">Calcular Imc</a>
            <a class="btn" href="#conversor-tempo" id="temperatura">Conversor de temp</a>

        <main>
            <section class="card" id="cotacao-moedas">

            </section>
            <section class="ativo" id="calculo-imc">

                    <div>
                        <label for="masculino">Masculino</label>
                        <input class="genero" type="radio" id="masculino" value="masculino" name="genero" checked>
                    </div>
                    <div>
                        <label for="feminino">Feminino</label>
                        <input class="genero" type="radio" id="feminino" value="feminino" name="genero" checked>
                    </div>

                    <label for="altura">Altura</label>
                    <input type="number" id="altura" placeholder="Digite sua altura">

                    <label for="peso">Peso</label>
                    <input type="number" id="peso" placeholder="Digite sua altura" >

                    <button>enviar</button>
                </form>
                <div class="resultado">
                    <p id="imc"></p>
                    <p id="tipoImc"></p>

                </div>
            </section>
            <section class="card" id="conversor-tempo"></section>
            <section class="card" id="conversor-velocidade"></section>
            <section class="card" id="conversor-massa"></section>
            <section class="card" id="calculo-tres"></section>
        </main>
    </div>

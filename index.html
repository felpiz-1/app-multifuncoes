<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
</head>
<body>
    <header>
        <h1>titulo</h1>
        <nav><img id="claroEscuro" src="img/brilho-e-contraste.png" alt="modo claro e escuro"></nav>
    </header>
    <div class="container">
        <aside id="pai-buttons">
            <a class="btn" href="#cotacao-moedas">Cotação</a>
            <a class="btn" href="#calculo-imc">Calculadora de Imc</a>
            <a class="btn" href="#conversor-temperatura">Conversor de temperatura</a>
            <a class="btn" href="#conversor-velocidade">Conversor de velocidade</a>
            <a class="btn" href="#conversor-massa">Conversor de massa</a>
            <a class="btn" href="#calculo-tres">Calculadora Proporção</a>
        </aside>
        <main>
            <section class="card" id="cotacao-moedas">
                <h1 class="tiruloSection">Cotação-Moedas</h1>   

                <form action="" id="formMoedas">
                    <div class="inputsCotação">
                        <select name="moeda1" id="moeda1">
                            <option value="BRL">BLR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="BTC">BTC</option>
                            <option value="CNY">CNY</option>
                            <option value="GBP">GBP</option>
                        </select>
                        <input type="text" id="inserirmoeda1">
                    </div>
                    <div class="inputsCotação">
                        <select name="moeda2" id="moeda2">
                            <option value="BRL">BLR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="CNY">CNY</option>
                            <option value="GBP">GBP</option>
                        </select>
                            <div class="resultadoMoedas">
                                <p id="valor"></p>
                            </div>
                    </div>
                    <button>Converter</button>
                </form>


            </section>

            <section class="card" id="calculo-imc">

                <h1 class="tiruloSection">Calculo imc</h1>

                <form action="" id="form">

                    <div class="box-genero">

                        <div class="genero-individual">
                            <label for="masculino">Masculino</label>
                            <input class="genero" type="radio" id="masculino" value="masculino" name="genero" checked>
                        </div>

                        <div class="genero-individual">
                            <label for="feminino">Feminino</label>
                            <input class="genero" type="radio" id="feminino" value="feminino" name="genero">
                        </div>

                    </div>

                    <label for="altura">Altura</label>
                    <input type="number" min="1" id="altura" placeholder="Digite sua altura em cm">

                    <label for="peso">Peso</label>
                    <input type="number" id="peso" step="0.1" placeholder="Digite seu peso" >

                    <button id="buttonIMC">enviar</button>
                </form>
                <div class="resultado">
                    <p id="imc"></p>
                    <p id="tipoImc"></p>

                </div>
            </section>
            <section class="card" id="conversor-temperatura">
                <h1 class="tiruloSection">conversor-temperatura</h1>
                
                <form action="" id="formTemperatura">
                    <div>
                        <select name="classe" id="classe">
                            <option value="c">C°</option>
                            <option value="f">F°</option>
                        </select>
                        <input id="temperatura" type="number" step="0.1">
                    </div>

                    <div>
                        <select name="classeResultado" id="classeResultado">
                            <option value="f">F°</option>
                            <option value="c">C°</option>
                        </select>
                        <div>
                            <p id="resultadoTemperatura"></p>
                        </div>
                    </div>
                    <button>Converter</button>
                </form>

            </section>
            <section class="card" id="conversor-velocidade">
                <h1 class="tiruloSection">conversor-velocidade</h1>

                <form action="" id="formVelocidade">
                    <div>
                        <select name="classeVelocidade" id="classeVelocidade">
                            <option value="km/h">km/h</option>
                            <option value="mph">mph</option>
                        </select>
                        <input id="velocidade" type="number">
                    </div>

                    <div>
                        <select name="" id="">
                            <option value="mph">mph</option>
                            <option value="km/h">km/h</option>
                        </select>
                        <div>
                            <p id="resultadoVelocidade"></p>
                        </div>
                    </div>
                    <button>Converter</button>
                </form>

            </section>
            <section class="card" id="conversor-massa">
                
                <h1 class="tiruloSection">conversor-massa</h1>

                <form action="" id="formMassa">
                    <div>
                        <select name="classeMassa" id="classeMassa">
                            <option value="kg">kg</option>
                            <option value="lbs">lbs</option>
                        </select>
                        <input id="massa" type="number" step="0.1">
                    </div>

                    <div>
                        <select name="" id="">
                            <option value="lbs">lbs</option>
                            <option value="kg">kg</option>
                        </select>
                        <div>
                            <p id="resultadoMassa"></p>
                        </div>
                    </div>
                    <button>Converter</button>

                </form>

            </section>
            <section class="card" id="calculo-tres">

                <h1 class="tiruloSection">Calculo Proporção</h1>

                <form id="formRegra" action="">

                    <div class="caixaRegra">
                        <input id="valor1" type="number" step="0.1">
                        <p>esta para</p>
                        <input id="valor2" type="number" step="0.1">
                    </div>

                    <p>assim como</p>

                    <div class="caixaRegra">
                        <input id="valor3" type="number" step="0.1">
                        <p>esta para</p>
                        <div class="resultadoMoedas">
                            <p id="resultadoRegra"></p>
                        </div>
                    </div>

                    <button>Calcular</button>

                </form>
            </section>
        </main>
    </div>
    <footer>

    </footer>
</body>
</html>

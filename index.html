<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
</head>
<body>
    <header>
        <h1>titulo</h1>
        <nav><img id="claroEscuro" src="img/brilho-e-contraste.png" alt="modo claro e escuro"></nav>
    </header>
    <div class="container">
        <aside id="pai-buttons">
            <a class="btn" href="#cotacao-moedas" id="cotacao">Cotação</a>
            <a class="btn" href="#calculo-imc" id="Imc">Calcular Imc</a>
            <a class="btn" href="#conversor-tempo" id="temperatura">Conversor de temp</a>
            <a class="btn" href="#conversor-velocidade" id="velocidade">Conversor de vel</a>
            <a class="btn" href="#conversor-massa" id="massa">Conversor de massa</a>
            <a class="btn" href="#calculo-tres" id="multiplicação">calculo regra de tres</a>
        </aside>
        <main>
            <section class="card" id="cotacao-moedas">
                <h1>Cotação-Moedas</h1>   

                <form action="" id="formMoedas">
                    <div class="inputsCotação">
                        <select name="moeda1" id="moeda1">
                            <option value="BRL">BLR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="BTC">BTC</option>
                            <option value="CNY">CNY</option>
                            <option value="GBP">GBP</option>
                        </select>
                        <input type="text" id="inserirmoeda1">
                    </div>
                    <div class="inputsCotação">
                        <select name="moeda2" id="moeda2">
                            <option value="BRL">BLR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="CNY">CNY</option>
                            <option value="GBP">GBP</option>
                        </select>
                            <div class="resultadoMoedas">
                                <p id="valor"></p>
                            </div>
                    </div>
                    <button>Converter</button>
                </form>


            </section>

            <section class="card" id="calculo-imc">
                <h1>Calculo imc</h1>
                <form action="" id="form">
                    <div class="box-genero">
                        <div class="genero-individual">
                            <label for="masculino">Masculino</label>
                            <input class="genero" type="radio" id="masculino" value="masculino" name="genero" checked>
                        </div>
                        <div class="genero-individual">
                            <label for="feminino">Feminino</label>
                            <input class="genero" type="radio" id="feminino" value="feminino" name="genero">
                        </div>
                    </div>

                    <label for="altura">Altura</label>
                    <input type="number" min="1" id="altura" placeholder="Digite sua altura">

                    <label for="peso">Peso</label>
                    <input type="number" id="peso" placeholder="Digite seu peso" >

                    <button id="buttonIMC">enviar</button>
                </form>
                <div class="resultado">
                    <p id="imc"></p>
                    <p id="tipoImc"></p>

                </div>
            </section>
            <section class="card" id="conversor-tempo">
                <h1>conversor-tempo</h1>
            </section>
            <section class="card" id="conversor-velocidade">
                <h1>conversor-velocidade</h1>
            </section>
            <section class="card" id="conversor-massa">
                <h1>conversor-massa</h1>
            </section>
            <section class="card" id="calculo-tres">
                <h1>Calculo Proporção</h1>

                <form id="formRegra" action="">
                    <div class="caixaRegra">
                        <input id="valor1" type="number">
                        <p>esta para</p>
                        <input id="valor2" type="number">
                    </div>
                    <p>assim como</p>
                    <div class="caixaRegra">
                        <input id="valor3" type="number">
                        <p>esta para</p>
                        <div class="resultadoMoedas"></div>
                    </div>
                    <button>Calcular</button>
                </form>
            </section>
        </main>
    </div>
    <footer>
        <h1>E-mail:</h1>
        <h1>E-mail:</h1>
        <h1>E-mail:</h1>
    </footer>
</body>
</html>
